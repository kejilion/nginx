# Emby 兼容 + 静态资源缓存增强版（基于 reverse-proxy-domain.conf）
# 请替换占位符：
#   yuming.com  -> 你的反代域名
#   fandaicom   -> 上游域名/服务（若 HTTPS，会用于 SNI）
# 注意：本文件通常被 include 到 http { } 内；下方 map/proxy_cache_path 需在 http 级生效。


# 反代缓存目录（静态资源）
# 如目录不存在：mkdir -p /var/cache/nginx/proxy/backend_yuming_com
proxy_cache_path /var/cache/nginx/proxy/fandaicom_cache
                 levels=1:2
                 keys_zone=fandaicom_cache:20m
                 max_size=1g
                 inactive=7d
                 use_temp_path=off;

server {
    listen 80;
    listen [::]:80;

    listen 443 ssl;
    listen [::]:443 ssl;

    # 可选：HTTP/3（保留）
    listen 443 quic;
    listen [::]:443 quic;

    server_name yuming.com;

    ssl_certificate     /etc/nginx/certs/yuming.com_cert.pem;
    ssl_certificate_key /etc/nginx/certs/yuming.com_key.pem;

    # HTTP -> HTTPS 跳转
    if ($scheme = http) {
      return 301 https://$host$request_uri;
    }

    # 上游为 HTTPS 域名时，开启 SNI
    proxy_ssl_server_name on;
    proxy_ssl_name fandaicom;

    # Emby 主路由（根路径）
    location / {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # 透传/识别所需头
        proxy_set_header Host fandaicom;               # 若上游需固定 Host，请保留
        proxy_set_header Referer https://fandaicom;    # 若不需要可移除
        proxy_set_header User-Agent $http_user_agent;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # 视频拖动相关
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;

        # sub_filter 需要禁用上游压缩
        proxy_set_header Accept-Encoding "";
        proxy_set_header Accept-Language $http_accept_language;

        # 长超时适配播放/转码
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        # 可选：进一步降低延迟
        # proxy_buffering off;
        # proxy_request_buffering off;

        # 若后端未配置外部 URL，需要域名替换
        sub_filter_once off;
        sub_filter "fandaicom" "yuming.com";

        proxy_pass https://fandaicom;
    }

    # 静态资源缓存（避免缓存 m3u8/ts 等动态分片，仅缓存常见静态后缀）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|bmp|swf|eot|svg|ttf|woff|woff2|webp)$ {
        proxy_pass https://fandaicom;
        proxy_http_version 1.1;

        proxy_set_header Host fandaicom;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # sub_filter 需要禁用上游压缩
        proxy_set_header Accept-Encoding "";
        proxy_set_header Connection "";

        proxy_cache fandaicom_cache;
        # 可选：更稳健的回源策略
        # proxy_cache_revalidate on;
        # proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        # proxy_cache_background_update on;
        # 可选：客户端缓存（遵循源站为主，需要强制可启用）
        # expires 7d;
        # add_header Cache-Control "public, max-age=604800, immutable";

        add_header X-Cache-Status $upstream_cache_status always;
        add_header Alt-Svc 'h3=":443"; ma=86400';
        log_not_found off;
        access_log off;
    }

    # ACME 校验
    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /var/www/letsencrypt;
    }

    # QUIC 提示
    add_header Alt-Svc 'h3=":443"; ma=86400' always;
}
